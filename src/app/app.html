<header class="header">
  <img class="header__title" src="assets/images/logo.svg" alt="logo">
  <button class="units-btn" type="button" (click)="toggleDropdown()" ><img src="assets/images/icon-units.svg"
      alt="icon-units">Units
    @if(isUnitDropdownOpen()) {
    <i class="fa-solid fa-chevron-up"></i>
    } @else {
    <i class="fa-solid fa-chevron-down"></i>
    }

    @let isCelsius = unitsService.temperatureUnit() === 'celsius';
    @let isFahrenheit = unitsService.temperatureUnit() === 'fahrenheit';
    @let isWindSpeedMetric = unitsService.windSpeedUnit() === 'kmh';
    @let isWindSpeedImperial = unitsService.windSpeedUnit() === 'mph';
    @let isPrecipitationMetric = unitsService.precipitationUnit() === 'mm';
    @let isPrecipitationImperial = unitsService.precipitationUnit() === 'inch';

    @if (isUnitDropdownOpen()) {
    <div class="unit-dropdown" #container>

      @if(isCelsius) {
      <button type="button" (click)="unitsService.setImperial()">Switch to Imperial</button>
      } @else {
      <button type="button" (click)="unitsService.setMetric()">Switch to Metric</button>
      }


      <div class="change-unit">
        <p class="unit">Temperature</p>
        <button type="button" (click)="changeTemperatureUnit('celsius')" [class.active]="isCelsius">Celsius (В°C)

          @if(isCelsius) {
          <i class="fa-solid fa-check"></i>
          }
        </button>

        <button type="button" (click)="changeTemperatureUnit('fahrenheit')" [class.active]="isFahrenheit">Fahrenheit
          (°F)

          @if(isFahrenheit) {
          <i class="fa-solid fa-check"></i>
          }
        </button>
      </div>

      <div class="change-unit">
        <p class="unit">Wind Speed</p>
        <button type="button" (click)="changeWindSpeedUnit('kmh')" [class.active]="isWindSpeedMetric">km/h

          @if(isWindSpeedMetric) {
          <i class="fa-solid fa-check"></i>
          }
        </button>

        <button type="button" (click)="changeWindSpeedUnit('mph')" [class.active]="isWindSpeedImperial">mph

          @if(isWindSpeedImperial) {
          <i class="fa-solid fa-check"></i>
          }
        </button>
      </div>

      <div class="change-unit">
        <p class="unit">Precipitation</p>
        <button type="button" (click)="changePrecipitationUnit('mm')" [class.active]="isPrecipitationMetric">Millimeters
          (mm)

          @if(isPrecipitationMetric) {
          <i class="fa-solid fa-check"></i>
          }
        </button>

        <button type="button" (click)="changePrecipitationUnit('inch')" [class.active]="isPrecipitationImperial">Inches
          (in)

          @if(isPrecipitationImperial) {
          <i class="fa-solid fa-check"></i>
          }
        </button>
      </div>
    </div>
    }
  </button>


</header>

<section>
  <app-weather-page></app-weather-page>
</section>
